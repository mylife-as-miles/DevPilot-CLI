        Hypothesis: Self-verification during decoding reduces reasoning errors on multi-hop QA
        Observable: Higher exact-match score on B_dev
        Conflicts: none - attacks verification axis not explored in trunk
        
        ## Parent / ancestor context (use only as background; do NOT search for these — search for the hypothesis above)
        
        Prior nodes found retrieval noise dominates failures.
        
        ## Focus directive
        
